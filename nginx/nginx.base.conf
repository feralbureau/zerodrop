worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    log_format waf '$remote_addr host=$host port=$server_port request="$request" status=$status upstream=$upstream_addr upstream_status=$upstream_status upstream_location=$upstream_http_location';
    access_log /var/log/nginx/access.log waf;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            try_files $uri /index.html;
        }
    }

    include /shared_nginx/waf.conf;
}

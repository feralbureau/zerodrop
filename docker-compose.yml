version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CADDY_ADMIN_URL=http://caddy:2019
      - DASHBOARD_HOST=waf.mimose.site
      - APP_HOST=app.mimose.site
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  redis-data:
  caddy_data:
  caddy_config:

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate --noinput && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CADDY_ADMIN_URL=http://caddy:2019
      - DASHBOARD_HOST=${DASHBOARD_HOST:-localhost}
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate --noinput && python manage.py runloops"
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CADDY_ADMIN_URL=http://caddy:2019
      - DASHBOARD_HOST=${DASHBOARD_HOST:-localhost}
    depends_on:
      - redis

  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    expose:
      - "80"
      - "443"
      - "2019"
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
      - DASHBOARD_HOST=${DASHBOARD_HOST:-localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  redis-data:
  caddy_data:
  caddy_config:

version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CADDY_ADMIN_URL=http://caddy:2019
      - DASHBOARD_HOST=${DASHBOARD_HOST}
      - APP_HOST=${APP_HOST}
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"
      - "443"
      - "2019"
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
      - DASHBOARD_HOST=${DASHBOARD_HOST}
      - APP_HOST=${APP_HOST}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  redis-data:
  caddy_data:
  caddy_config:
